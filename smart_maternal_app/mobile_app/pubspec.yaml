name: maternal
description: "Maternal mobile app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.0
  flutter_secure_storage: ^9.0.0
  fluttertoast: ^8.2.4
  get: ^4.6.6
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  intl: ^0.19.0
  table_calendar: ^3.1.2
  qr_flutter: ^4.1.0
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # ⚠️ keep assets ONLY if they exist
  # If folders are missing, comment this out temporarily
  assets:
    - assets/images/
    - assets/images/danger_sign/
    - assets/images/nutrition/
    - assets/pregnant1.png